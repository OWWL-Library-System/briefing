<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
      color: #333;
    }
    header {
      margin-bottom: 24px;
    }
    img.logo {
      max-height: 90px;
    }
    h1 {
      margin-top: 0;
      font-weight: 500;
    }
    h2 {
      margin-top: 32px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    h3 {
      margin-top: 24px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    p {
      margin: 0 0 16px 0;
    }
    ul,
    ol {
      margin: 0 0 16px 20px;
      padding: 0;
    }
    li {
      margin-bottom: 6px;
    }
    a {
      color: #005a9c;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 0.95em;
    }
    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: #f7f7f7;
      font-weight: 500;
    }
    blockquote {
      border-left: 5px solid #005a9c;
      background-color: #f5f8fb;
      padding: 12px 16px;
      margin: 24px 0;
      color: #444;
    }
    blockquote p:last-child {
      margin-bottom: 0;
    }
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 32px 0;
    }
    strong {
      font-weight: 500;
    }
    footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #ddd;
      font-size: 0.85em;
      color: #888;
    }
    .tldr .action {
      font-weight: 600;
      padding: 2px 6px;
      font-size: 0.85em;
      border-radius: 3px;
      margin-right: 6px;
      display: inline-block;
    }
    /* Urgent */
    .tldr .action-urgent {
      background-color: #fef3f2;
      color: #b42318;
    }
    /* Recommended */
    .tldr .action-recommended {
      background-color: #ecfdf3;
      color: #027a48;
    }
    /* Requested */
    .tldr .action-requested {
      background-color: #fff7e6;
      color: #b45309;
    }
    /* Optional */
    .tldr .action-optional {
      background-color: #f1f5f9;
      color: #334155;
    }
    /* Checkboxes in TLDR lists */
    .tldr ul {
      list-style: none;
      margin-left: 0;
      padding-left: 0;
    }
    .tldr ul li::before {
      content: '☐ ';
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}">
      <img class="logo" 
     src="{{ '/assets/images/owwl_library_system_logo.png' | relative_url }}" 
     alt="OWWL Logo">
    </a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p><a href="https://docs.owwl.org/Members/DirectorBriefing">Director Briefing Archive</a></p>
  </footer>
</body>
</html>
